<script type="text/babel" data-presets="env,react">

const Copy = ({ className = '' }) => (

// ---------- Animation helpers ----------
const ease = [0.16, 1, 0.3, 1];
const cardEase = [0.22, 1, 0.36, 1];
const easeOut = "easeOut";

// WordsPullUp
function WordsPullUp({ text, className = '', showAsterisk = false, wordClassName = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  const words = text.split(' ');
  return (
    <div ref={ref} className={className} style={{ display: 'inline-flex', flexWrap: 'wrap', position: 'relative' }}>
      {words.map((w, i) => (
        <motion.span
          key={`w-${i}`}
          initial={{ y: 20, opacity: 0 }}
          animate={inView ? { y: 0, opacity: 1 } : { y: 20, opacity: 0 }}
          transition={{ duration: 0.8, delay: i * 0.08, ease }}
          className={wordClassName}
          style={{ display: 'inline-block', position: 'relative', marginRight: '0.22em' }}
        >
          {w}
          {i === words.length - 1 && showAsterisk ? (
            <i style={{ position: 'absolute', top: '0.06em', right: '-0.28em', fontSize: '0.31em', lineHeight: 1, fontStyle: 'normal' }}>*</i>
          ) : null}
        </motion.span>
      ))}
    </div>
  );
}

// WordsPullUpMultiStyle — array of { text, className }
function WordsPullUpMultiStyle({ segments, container = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  // Flatten into words, preserving className
  const words = [];
  segments.forEach(seg => {
    seg.text.split(' ').filter(Boolean).forEach(w => words.push({ w, cn: seg.className || '' }));
  });
  return (
    <div ref={ref} className={`inline-flex flex-wrap justify-center ${container}`}>
      {words.map((item, i) => (
        <motion.span
          key={i}
          initial={{ y: 20, opacity: 0 }}
          animate={inView ? { y: 0, opacity: 1 } : { y: 20, opacity: 0 }}
          transition={{ duration: 0.8, delay: i * 0.08, ease }}
          className={item.cn}
          style={{ display: 'inline-block', marginRight: '0.22em' }}
        >
          {item.w}
        </motion.span>
      ))}
    </div>
  );
}

// Line-by-line pull up for multi-line Korean text
function LinesPullUp({ lines, className = '', lineClassName = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  return (
    <div ref={ref} className={className}>
      {lines.map((line, i) => (
        <motion.div
          key={i}
          initial={{ y: 20, opacity: 0 }}
          animate={inView ? { y: 0, opacity: 1 } : { y: 20, opacity: 0 }}
          transition={{ duration: 0.8, delay: i * 0.2, ease }}
          className={lineClassName}
        >
          {line}
        </motion.div>
      ))}
    </div>
  );
}

// AnimatedLetter — scroll linked opacity per char
function ScrollRevealParagraph({ text, className = '' }) {
  const ref = useRef(null);
  const { scrollYProgress } = useScroll({ target: ref, offset: ['start 0.8', 'end 0.2'] });
  const chars = useMemo(() => text.split(''), [text]);
  return (
    <p ref={ref} className={className} style={{ color: '#DEDBC8' }}>
      {chars.map((c, i) => {
        const start = i / chars.length - 0.1;
        const end = i / chars.length + 0.05;
        const opacity = useTransform(scrollYProgress, [Math.max(0, start), Math.min(1, end)], [0.2, 1]);
        return (
          <motion.span key={i} style={{ opacity }}>
            {c}
          </motion.span>
        );
      })}
    </p>
  );
}

// ---------- FEATURES (3 cards: About / Work / Perspective) ----------
function FeatureCard({ index = 0, children, className = '', style = {}, href = '#' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, margin: '-100px' });
  return (
    <motion.a
      ref={ref}
      href={href}
      initial={{ scale: 0.95, opacity: 0 }}
      animate={inView ? { scale: 1, opacity: 1 } : { scale: 0.95, opacity: 0 }}
      transition={{ duration: 0.9, delay: index * 0.15, ease: cardEase }}
      className={`group relative overflow-hidden rounded-2xl block transition-transform duration-500 hover:scale-[1.02] ${className}`}
      style={style}
    >
      {children}
    </motion.a>
  );
}

// ---------- FOOTER (contact) ----------
function Footer() {
  const [copied, setCopied] = useState(false);
  const email = 'dennett0610@gmail.com';

  const handleCopy = async (e) => {
    e.preventDefault();
    try {
      await navigator.clipboard.writeText(email);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (err) {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = email;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch(_) {}
      document.body.removeChild(ta);
    }
  };

  return (
    <footer id="contact" className="bg-black px-4 md:px-6 py-20 md:py-32 border-t border-white/5">
      <div className="max-w-5xl mx-auto text-center">
        <div className="text-primary text-[10px] sm:text-xs tracking-widest uppercase mb-8 sm:mb-12">
          Contact
        </div>

        <h2 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-normal mb-10 sm:mb-14 leading-[1.05]" style={{ color: '#E1E0CC' }}>
          <WordsPullUp text="나와 일하고 싶다면" />
        </h2>

        <p className="text-primary/70 text-sm sm:text-base md:text-lg max-w-2xl mx-auto mb-12 sm:mb-16 leading-relaxed">
          비효율이 보이는 팀, 구조를 바꿀 준비가 된 조직,<br className="hidden sm:block" />
          AI를 진지하게 쓰고 싶은 곳이라면 어디든 이야기 나눠보고 싶습니다.
        </p>

        <button
          onClick={handleCopy}
          className="group inline-flex items-center gap-3 bg-primary text-black rounded-full pl-6 pr-2 py-2 transition-all duration-300 hover:gap-4"
        >
          <span className="font-medium text-base sm:text-lg">{copied ? '복사되었습니다' : email}</span>
          <span className="bg-black rounded-full w-10 h-10 sm:w-11 sm:h-11 grid place-items-center transition-transform duration-300 group-hover:scale-110">
            {copied
              ? <Check className="w-4 h-4 sm:w-[18px] sm:h-[18px]" style={{ color: '#E1E0CC' }} />

            }
          </span>
        </button>

        <div className="mt-20 sm:mt-28 text-[10px] sm:text-xs text-gray-500 mono uppercase tracking-widest">
          © 2026 Choi Kwanhyeok
        </div>
      </div>
    </footer>
  );
}
